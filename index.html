<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benito Stephen R | AI Portfolio</title>

  <meta name="description" content="Benito Stephen R - AI & Data Science Portfolio">

  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1055/1055687.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <style>
    body { margin:0; font-family:'Poppins',sans-serif; background:#020617; color:#e2e8f0; }
    #particles-js { position:fixed; width:100%; height:100%; z-index:-1; }
    header { text-align:center; padding:100px 20px; }
    h1 { font-size:3rem; }

    .btn {
      margin:10px; padding:12px 22px; border-radius:30px;
      background:#38bdf8; color:black; text-decoration:none; font-weight:bold;
      transition:0.3s;
    }
    .btn:hover { transform:scale(1.15); box-shadow:0 0 15px #38bdf8; }

    section { padding:60px 20px; max-width:1100px; margin:auto; }
    h2 { color:#38bdf8; }

    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px; }

    .card {
      background:#0f172a; padding:20px; border-radius:15px;
      transition:0.3s; border:1px solid #1e293b;
    }
    .card:hover { transform:translateY(-12px); box-shadow:0 15px 30px rgba(56,189,248,0.4); }

    footer { text-align:center; padding:20px; color:#64748b; }

    /* Jarvis Chat */
    #chatbot {
      position:fixed; bottom:20px; right:20px; width:300px;
      background:#0f172a; border-radius:15px; border:1px solid #1e293b;
      overflow:hidden;
    }
