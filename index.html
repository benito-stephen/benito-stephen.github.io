<button onclick="sendMessage()">Send</button>
</div>

<script>
// particles
particlesJS("particles-js",{particles:{number:{value:60},size:{value:3}}});

// chart
new Chart(document.getElementById('skillsChart'),{
type:'bar',
data:{labels:['Python','ML','Data','IoT'],datasets:[{data:[90,80,85,75]}]}
});

// 🔥 REAL AI CHATBOT
async function sendMessage(){
let input=document.getElementById("userInput").value;
let chat=document.getElementById("chat-body");

chat.innerHTML += "<p><b>You:</b> "+input+"</p>";

let response=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer 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"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:input}]
})
});

let data=await response.json();
let reply=data.choices[0].message.content;

chat.innerHTML += "<p><b>Jarvis:</b> "+reply+"</p>";
}
</script>
